version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm --prefix frontend install
    build:
      commands:
        - VITE_API_URL=https://olqjxmkedpgnccwbwbqpk7kmui0bvcem.lambda-url.ap-southeast-1.on.aws npm --prefix frontend run build
  artifacts:
    baseDirectory: frontend/dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
customRules:
  - source: '</^[^.]+$|\.(?!(css|gif|ico|jpg|js|png|txt|svg|woff|woff2|ttf|map|json|jpeg)$)([^.]+$)/>'
    target: '/index.html'
    status: '200'